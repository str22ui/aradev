services:
  app:
    image: str22ui/aradev:latest
    container_name: aradev-app
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: str22ui/aradev-db:latest
    container_name: aradev-db
    environment:
      MARIADB_DATABASE: u433934007_aradev
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_USER: aradev
      MARIADB_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 15

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: aradev-pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: aradev
      PMA_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
